# 새 프로젝트 시작 워크플로우
# 기획 → 디자인 → 개발 파이프라인

name: "신규 프로젝트"
trigger: "새 프로젝트 시작"

steps:
  - id: research
    team: planning
    agent: "기획자"
    task: "시장 조사 및 요구사항 분석"
    inputs:
      - 프로젝트 아이디어/주제
    outputs:
      - docs/research.md (시장 조사 결과)
      - docs/requirements.md (요구사항 문서)
    next: spec

  - id: spec
    team: planning
    agent: "기획자"
    task: "프로젝트 스펙 작성"
    inputs:
      - docs/requirements.md
    outputs:
      - docs/spec.md (기능 스펙)
      - docs/user-stories.md (사용자 스토리)
    next: design

  - id: design
    team: design
    agent: "디자이너"
    task: "UI/UX 설계"
    inputs:
      - docs/spec.md
      - docs/user-stories.md
    outputs:
      - design/wireframes/ (와이어프레임)
      - design/tokens.json (디자인 토큰)
      - design/components.md (컴포넌트 스펙)
    next: [frontend, backend]

  - id: frontend
    team: frontend
    agent: "프론트엔드개발자"
    task: "클라이언트 구현"
    inputs:
      - design/tokens.json
      - design/components.md
    outputs:
      - src/app/ (Next.js 페이지)
      - src/components/ (UI 컴포넌트)
    parallel: true

  - id: backend
    team: backend
    agent: "백엔드개발자"
    task: "API & 서버 구현"
    inputs:
      - docs/spec.md
    outputs:
      - api/ (API 서버)
      - db/schema/ (DB 스키마)
      - docs/api.md (API 문서)
    parallel: true
